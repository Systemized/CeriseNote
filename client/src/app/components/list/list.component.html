<div id="list-header">
    <div>Lists</div>
    <button mat-icon-button (click)="openEditList()"><mat-icon>format_list_bulleted_add</mat-icon></button>
</div>
<mat-nav-list>
    <mat-list-item *ngFor="let list of lists" (click)="selectList(list._id)"
        [class.selected]="list._id === selectedListId">
        {{ list.name }}
    </mat-list-item>
</mat-nav-list>
